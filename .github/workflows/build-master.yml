name: Build MASTER_DIRECTIVES

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'scripts/build_master.sh'
      - '.github/workflows/build-master.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate MASTER_DIRECTIVES.md
        run: |
          chmod +x scripts/build_master.sh
          ./scripts/build_master.sh

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MASTER_DIRECTIVES.md
          if git diff --staged --quiet; then
            echo "→ MASTER_DIRECTIVES.md inchangé, pas de commit."
          else
            git commit -m "auto: rebuild MASTER_DIRECTIVES [skip ci]"
            git push
            echo "✓ MASTER_DIRECTIVES.md mis à jour."
          fi
