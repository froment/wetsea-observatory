name: wetsea-packaging typecheck

on:
  push:
    paths:
      - "wetsea-packaging/**"
      - ".github/workflows/typecheck.yml"
  pull_request:
    paths:
      - "wetsea-packaging/**"
      - ".github/workflows/typecheck.yml"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wetsea-packaging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: wetsea-packaging/package-lock.json
      - run: npm ci
      - run: npm run typecheck
